# Configuración SonarQube / SonarCloud para SIDEM-PAN
# Ejecutar con:  sonar-scanner   (requiere servidor SonarQube o token de SonarCloud)
sonar.projectKey=sidem-pan
sonar.projectName=SIDEM-PAN — Debida Diligencia Migratoria
sonar.projectVersion=0.1.0

# Código fuente analizado (se excluye el UI generado por shadcn y dependencias)
sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,frontend/src/components/ui/**,**/*.test.ts,**/dist/**

# Pruebas y cobertura
sonar.tests=backend/src
sonar.test.inclusions=**/*.test.ts
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
