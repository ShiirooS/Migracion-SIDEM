name: SIDEM-PAN — Database Migrations

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/src/db/migrations/**'
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      include_seed:
        description: 'Incluir datos de prueba (seed)?'
        required: false
        default: 'false'
        type: boolean

jobs:
  migrate:
    name: Ejecutar migraciones en Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias del backend
        run: cd backend && npm ci

      - name: Ejecutar migraciones SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: cd backend && npm run migrate

      - name: Ejecutar seed de datos de prueba
        if: ${{ github.event.inputs.include_seed == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: cd backend && npm run seed
