services:
  postgres:
    image: postgres:16-alpine
    container_name: sidem_pan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sidem_pan}
      POSTGRES_USER: ${POSTGRES_USER:-sidem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidem_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro

volumes:
  db_data:
